<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music — GIANNI</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .music-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .music-header h2 {
      font-size: 1.6rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .music-header h2 svg {
      width: 28px;
      height: 28px;
      stroke: var(--blue);
    }
    .waveform {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 48px;
      margin: 1.5rem 0;
      justify-content: center;
    }
    .wave-bar {
      width: 5px;
      border-radius: 3px;
      background: linear-gradient(180deg, #3b82f6, #6366f1);
      transition: height 0.3s ease;
      min-height: 4px;
    }
    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .progress-interactive {
      height: 6px;
      background: var(--bg-card2);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .progress-interactive-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      border-radius: 3px;
      pointer-events: none;
      transition: width 0.1s linear;
    }
    .volume-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }
    .volume-row svg {
      width: 18px;
      height: 18px;
      stroke: var(--text-muted);
      flex-shrink: 0;
    }
    .volume-slider {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--bg-card2);
      border-radius: 2px;
      outline: none;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #3b82f6;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
    }
    .playlist-header {
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-light);
      font-weight: 700;
    }
    .playlist-header span:last-child {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .track-info { text-align: center; margin-bottom: 1.5rem; }
    .track-title { font-size: 1.2rem; font-weight: 700; }
    .track-artist { color: var(--text-muted); font-size: 0.875rem; }
    @media (max-width: 768px) {
      .music-player { padding: 1.5rem; }
      .disc-wrapper { width: 140px; height: 140px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      GIANNI
    </a>
    <ul class="navbar-nav">
      <li><a href="/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a></li>
      <li><a href="/games">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4"/><path d="M8 10v4"/><circle cx="16" cy="13" r="1.5"/><circle cx="19" cy="11" r="1.5"/></svg>
        Games
      </a></li>
      <li><a href="/music" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Music
      </a></li>
      <li><a href="/servers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
        Servers
      </a></li>
      <li><a href="/leaderboards">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        Leaderboards
      </a></li>
      <li id="nav-botpanel" style="display:none;"><a href="/bot-panel" class="btn-bot-panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Bot Panel
      </a></li>
    </ul>
    <div style="display:flex;align-items:center;gap:1rem;">
      <button class="mobile-toggle" onclick="toggleMobileNav()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="navbar-user" id="navbar-user">
        <div class="spinner" style="width:24px;height:24px;border-width:2px;"></div>
      </div>
    </div>
  </nav>

  <div class="mobile-nav" id="mobile-nav">
    <a href="/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
    <a href="/games"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4"/><path d="M8 10v4"/><circle cx="16" cy="13" r="1.5"/><circle cx="19" cy="11" r="1.5"/></svg>Games</a>
    <a href="/music" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>Music</a>
    <a href="/servers"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>Servers</a>
    <a href="/leaderboards"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>Leaderboards</a>
  </div>

  <div class="page">
    <div class="container section">
      <div class="music-header">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          GIANNI Music Player
        </h2>
        <button class="btn btn-outline btn-sm" onclick="savePlaylist()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save Playlist
        </button>
      </div>

      <div class="music-player">
        <div class="track-info">
          <div class="track-title" id="track-title">No track playing</div>
          <div class="track-artist" id="track-artist">Select a song from the playlist</div>
        </div>

        <div class="disc-wrapper">
          <div class="disc" id="disc">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
        </div>

        <div class="progress-section">
          <div class="time-row">
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
          </div>
          <div class="progress-interactive" id="progress-bar" onclick="seekTrack(event)">
            <div class="progress-interactive-fill" id="progress-fill" style="width:0%"></div>
          </div>
        </div>

        <div class="waveform" id="waveform"></div>

        <div class="player-controls">
          <button class="ctrl-btn" id="btn-shuffle" onclick="toggleShuffle()" title="Shuffle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          </button>
          <button class="ctrl-btn" onclick="prevTrack()" title="Previous">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
          </button>
          <button class="play-btn" id="play-btn" onclick="togglePlay()">
            <svg viewBox="0 0 24 24" fill="currentColor" id="play-icon"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
          <button class="ctrl-btn" onclick="nextTrack()" title="Next">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
          </button>
          <button class="ctrl-btn" id="btn-repeat" onclick="toggleRepeat()" title="Repeat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          </button>
        </div>

        <div class="volume-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          <input type="range" class="volume-slider" id="volume" min="0" max="100" value="70" oninput="setVolume(this.value)">
          <span id="volume-val" style="font-size:0.75rem;color:var(--text-muted);min-width:32px;">70%</span>
        </div>
      </div>

      <div class="playlist">
        <div class="playlist-header">
          <span>Queue</span>
          <span id="queue-count">0 songs</span>
        </div>
        <div id="playlist-items"></div>
      </div>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    const TRACKS = [
      { id: 1, title: 'Chill Vibes', artist: 'Lo-Fi Artist', duration: '3:24' },
      { id: 2, title: 'Night Drive', artist: 'Synth Wave', duration: '4:12' },
      { id: 3, title: 'Gaming Time', artist: 'Electronic', duration: '2:58' },
      { id: 4, title: 'Smooth Jazz', artist: 'Jazz Collective', duration: '5:01' },
      { id: 5, title: 'Epic Boss Fight', artist: 'OST Master', duration: '3:45' },
    ];

    let currentTrack = 0;
    let isPlaying = false;
    let shuffle = false;
    let repeat = false;
    let progress = 0;
    let progressInterval = null;
    let waveInterval = null;

    function toggleMobileNav() {
      document.getElementById('mobile-nav').classList.toggle('show');
    }

    function renderPlaylist() {
      const container = document.getElementById('playlist-items');
      document.getElementById('queue-count').textContent = TRACKS.length + ' songs';
      container.innerHTML = '';

      TRACKS.forEach((t, i) => {
        const item = document.createElement('div');
        item.className = 'playlist-item ' + (i === currentTrack ? 'active' : '');
        item.onclick = () => selectTrack(i);
        item.innerHTML = `
          <div class="playlist-disc">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
          <div class="playlist-info">
            <div class="playlist-name">${escapeHtml(t.title)}</div>
            <div class="playlist-artist">${escapeHtml(t.artist)}</div>
          </div>
          <div class="playlist-duration">${t.duration}</div>
        `;
        container.appendChild(item);
      });
    }

    function selectTrack(idx) {
      currentTrack = idx;
      progress = 0;
      updateTrackInfo();
      renderPlaylist();
      if (isPlaying) startProgress();
    }

    function updateTrackInfo() {
      const t = TRACKS[currentTrack];
      document.getElementById('track-title').textContent = t.title;
      document.getElementById('track-artist').textContent = t.artist;
      document.getElementById('time-total').textContent = t.duration;
    }

    function togglePlay() {
      isPlaying = !isPlaying;
      const icon = document.getElementById('play-icon');
      if (isPlaying) {
        icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
      } else {
        icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
      }
      document.getElementById('disc').classList.toggle('playing', isPlaying);
      if (isPlaying) startProgress(); else stopProgress();
      animateWaveform();
    }

    function startProgress() {
      stopProgress();
      const parts = TRACKS[currentTrack].duration.split(':');
      const totalSec = parseInt(parts[0]) * 60 + parseInt(parts[1]);
      progressInterval = setInterval(() => {
        progress = Math.min(progress + (100 / totalSec), 100);
        document.getElementById('progress-fill').style.width = progress + '%';
        const elapsed = Math.floor((progress / 100) * totalSec);
        document.getElementById('time-current').textContent = Math.floor(elapsed/60) + ':' + String(elapsed%60).padStart(2,'0');
        if (progress >= 100) { nextTrack(); }
      }, 1000);
    }

    function stopProgress() {
      if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
    }

    function nextTrack() {
      currentTrack = shuffle
        ? Math.floor(Math.random() * TRACKS.length)
        : (currentTrack + 1) % TRACKS.length;
      progress = 0;
      updateTrackInfo();
      renderPlaylist();
      if (isPlaying) startProgress();
    }

    function prevTrack() {
      currentTrack = (currentTrack - 1 + TRACKS.length) % TRACKS.length;
      progress = 0;
      updateTrackInfo();
      renderPlaylist();
      if (isPlaying) startProgress();
    }

    function seekTrack(e) {
      const bar = document.getElementById('progress-bar');
      const rect = bar.getBoundingClientRect();
      progress = ((e.clientX - rect.left) / rect.width) * 100;
      document.getElementById('progress-fill').style.width = progress + '%';
    }

    function toggleShuffle() {
      shuffle = !shuffle;
      document.getElementById('btn-shuffle').style.color = shuffle ? '#3b82f6' : '';
      showToast(shuffle ? 'Shuffle ON' : 'Shuffle OFF');
    }

    function toggleRepeat() {
      repeat = !repeat;
      document.getElementById('btn-repeat').style.color = repeat ? '#3b82f6' : '';
      showToast(repeat ? 'Repeat ON' : 'Repeat OFF');
    }

    function setVolume(v) {
      document.getElementById('volume-val').textContent = v + '%';
    }

    function savePlaylist() {
      showToast('Playlist saved!', 'success');
    }

    function buildWaveform() {
      const wf = document.getElementById('waveform');
      wf.innerHTML = '';
      for (let i = 0; i < 32; i++) {
        const bar = document.createElement('div');
        bar.className = 'wave-bar';
        bar.style.height = '4px';
        wf.appendChild(bar);
      }
    }

    function animateWaveform() {
      if (waveInterval) { clearInterval(waveInterval); waveInterval = null; }
      if (!isPlaying) {
        document.querySelectorAll('.wave-bar').forEach(b => b.style.height = '4px');
        return;
      }
      waveInterval = setInterval(() => {
        if (!isPlaying) return;
        document.querySelectorAll('.wave-bar').forEach(b => {
          b.style.height = (Math.random() * 36 + 4) + 'px';
        });
      }, 150);
    }

    async function init() {
      const user = await initUser();
      if (!user) { window.location.href = '/login'; return; }
      buildWaveform();
      updateTrackInfo();
      renderPlaylist();
    }
    init();
  </script>
</body>
</html>
