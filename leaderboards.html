<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboards — GIANNI</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .lb-header {
      text-align: center;
      padding: 2rem 1.5rem;
    }
    .lb-header h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 900;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }
    .lb-header h1 svg {
      width: 36px;
      height: 36px;
      stroke: var(--warning);
    }
    .lb-header p {
      color: var(--text-muted);
      max-width: 500px;
      margin: 0 auto;
    }
    .lb-tabs {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .lb-tab {
      padding: 0.5rem 1.25rem;
      border-radius: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      color: var(--text-muted);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      font-family: inherit;
    }
    .lb-tab:hover { color: var(--text); border-color: var(--border); }
    .lb-tab.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border-color: transparent;
      box-shadow: 0 0 20px var(--primary-glow);
    }
    .lb-loading {
      text-align: center;
      padding: 3rem;
    }
    .lb-loading p {
      color: var(--text-muted);
      margin-top: 1rem;
      font-size: 0.875rem;
    }
    .lb-empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .lb-empty svg {
      width: 64px;
      height: 64px;
      stroke: var(--text-dim);
      margin-bottom: 1rem;
    }
    .podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 1rem;
      margin: 2rem 0 3rem;
      padding: 0 1rem;
    }
    .podium-item {
      text-align: center;
      padding: 1.5rem 1rem;
      border-radius: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      min-width: 120px;
      transition: all 0.3s;
    }
    .podium-item:hover {
      transform: translateY(-4px);
      border-color: var(--border);
    }
    .podium-item.first {
      order: 2;
      padding: 2rem 1.25rem;
      background: linear-gradient(180deg, rgba(251,191,36,0.1), var(--bg-card));
      border-color: rgba(251,191,36,0.3);
    }
    .podium-item.second {
      order: 1;
      background: linear-gradient(180deg, rgba(156,163,175,0.1), var(--bg-card));
      border-color: rgba(156,163,175,0.3);
    }
    .podium-item.third {
      order: 3;
      background: linear-gradient(180deg, rgba(217,119,6,0.1), var(--bg-card));
      border-color: rgba(217,119,6,0.3);
    }
    .podium-rank {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
    }
    .podium-item.first .podium-rank { color: #fbbf24; text-shadow: 0 0 15px rgba(251,191,36,0.3); }
    .podium-item.second .podium-rank { color: #9ca3af; }
    .podium-item.third .podium-rank { color: #d97706; }
    .podium-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.25rem; }
    .podium-xp { font-size: 0.8rem; color: var(--text-muted); }
    @media (max-width: 500px) {
      .podium { gap: 0.5rem; }
      .podium-item { min-width: 90px; padding: 1rem 0.5rem; }
      .podium-item.first { padding: 1.25rem 0.75rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      GIANNI
    </a>
    <ul class="navbar-nav">
      <li><a href="/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a></li>
      <li><a href="/games">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4"/><path d="M8 10v4"/><circle cx="16" cy="13" r="1.5"/><circle cx="19" cy="11" r="1.5"/></svg>
        Games
      </a></li>
      <li><a href="/music">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Music
      </a></li>
      <li><a href="/servers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
        Servers
      </a></li>
      <li><a href="/leaderboards" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        Leaderboards
      </a></li>
      <li id="nav-botpanel" style="display:none;"><a href="/bot-panel" class="btn-bot-panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Bot Panel
      </a></li>
    </ul>
    <div style="display:flex;align-items:center;gap:1rem;">
      <button class="mobile-toggle" onclick="toggleMobileNav()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="navbar-user" id="navbar-user">
        <div class="spinner" style="width:24px;height:24px;border-width:2px;"></div>
      </div>
    </div>
  </nav>

  <div class="mobile-nav" id="mobile-nav">
    <a href="/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
    <a href="/games"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4"/><path d="M8 10v4"/><circle cx="16" cy="13" r="1.5"/><circle cx="19" cy="11" r="1.5"/></svg>Games</a>
    <a href="/music"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>Music</a>
    <a href="/servers"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>Servers</a>
    <a href="/leaderboards" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>Leaderboards</a>
  </div>

  <div class="page">
    <div class="lb-header">
      <h1>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        Leaderboards
      </h1>
      <p>Compete with the community. Earn XP, level up, and claim your spot at the top.</p>
    </div>

    <div class="container" style="padding-bottom:3rem;">
      <div class="lb-tabs">
        <button class="lb-tab active" onclick="setTab('xp', this)">XP Ranking</button>
        <button class="lb-tab" onclick="setTab('games', this)">Games Played</button>
        <button class="lb-tab" onclick="setTab('music', this)">Music Hours</button>
      </div>

      <div class="podium" id="podium"></div>

      <div class="leaderboard-container">
        <div class="lb-loading" id="lb-loading">
          <div class="spinner" style="margin:0 auto;"></div>
          <p>Loading leaderboard...</p>
        </div>
        <div id="lb-list" style="display:none;"></div>
      </div>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    let currentTab = 'xp';

    function toggleMobileNav() {
      document.getElementById('mobile-nav').classList.toggle('show');
    }

    function setTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      loadLeaderboard();
    }

    function getTrendIcon(trend) {
      if (trend === 'up') {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>';
      }
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/></svg>';
    }

    function getRankClass(rank) {
      if (rank === 1) return 'gold';
      if (rank === 2) return 'silver';
      if (rank === 3) return 'bronze';
      return '';
    }

    async function loadLeaderboard() {
      document.getElementById('lb-list').style.display = 'none';
      document.getElementById('lb-loading').style.display = 'block';
      document.getElementById('podium').innerHTML = '';

      try {
        const res = await fetch('/api/leaderboard');
        const data = await res.json();

        document.getElementById('lb-loading').style.display = 'none';
        document.getElementById('lb-list').style.display = 'block';

        // Podium
        const top3 = data.slice(0, 3);
        const podiumHTML = top3.map((p, i) => {
          const classes = ['second', 'first', 'third'];
          const medals = ['2nd', '1st', '3rd'];
          return `
            <div class="podium-item ${classes[i]}">
              <div class="podium-rank">${medals[i]}</div>
              <div class="podium-name">${escapeHtml(p.username)}</div>
              <div class="podium-xp">${formatNumber(p.xp)} XP</div>
            </div>
          `;
        }).join('');
        document.getElementById('podium').innerHTML = podiumHTML;

        // List
        const list = document.getElementById('lb-list');
        list.innerHTML = '';
        data.forEach((entry, idx) => {
          const item = document.createElement('div');
          item.className = 'lb-item animate-fade-in';
          item.style.animationDelay = (idx * 0.04) + 's';
          item.innerHTML = `
            <div class="lb-rank ${getRankClass(entry.rank)}">${entry.rank}</div>
            <div class="lb-avatar">${escapeHtml(entry.username.charAt(0).toUpperCase())}</div>
            <div class="lb-info">
              <div class="lb-username">${escapeHtml(entry.username)}</div>
              <div class="lb-level">Level ${entry.level}</div>
            </div>
            <div class="lb-xp">${formatNumber(entry.xp)} XP</div>
            <div class="lb-trend ${entry.trend === 'up' ? 'trend-up' : 'trend-down'}">
              ${getTrendIcon(entry.trend)}
            </div>
          `;
          list.appendChild(item);
        });
      } catch {
        document.getElementById('lb-loading').innerHTML = `
          <div class="lb-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <div style="font-weight:600;margin-bottom:0.25rem;">Failed to load leaderboard</div>
            <div style="font-size:0.875rem;">Please try again later.</div>
          </div>
        `;
      }
    }

    async function init() {
      const user = await initUser();
      if (!user) { window.location.href = '/login'; return; }
      loadLeaderboard();
    }
    init();
  </script>
</body>
</html>
