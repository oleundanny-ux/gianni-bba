<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — GIANNI</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .dashboard-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 20px;
    }
    .dashboard-avatar {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      object-fit: cover;
      border: 3px solid var(--primary);
    }
    .dashboard-avatar-placeholder {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 800;
      color: white;
      border: 3px solid var(--primary);
    }
    .dashboard-info h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.25rem;
    }
    .dashboard-info p {
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    .level-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(91,33,182,0.1));
      border: 1px solid rgba(124,58,237,0.3);
      padding: 0.4rem 1rem;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--primary-light);
      margin-top: 0.5rem;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .xp-bar-container {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .xp-bar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .xp-bar-header h3 {
      font-size: 1rem;
      font-weight: 700;
    }
    .xp-bar-header span {
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    .recent-activity {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 1.5rem;
    }
    .recent-activity h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .activity-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.875rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
      box-shadow: 0 0 8px var(--primary-glow);
    }
    .activity-text { flex: 1; font-size: 0.875rem; }
    .activity-time { font-size: 0.75rem; color: var(--text-muted); }
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .dashboard-header { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      GIANNI
    </a>
    <ul class="navbar-nav">
      <li><a href="/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
      </a></li>
      <li><a href="/games">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4"/><path d="M8 10v4"/><circle cx="16" cy="13" r="1.5"/><circle cx="19" cy="11" r="1.5"/></svg>Games
      </a></li>
      <li><a href="/music">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>Music
      </a></li>
      <li><a href="/servers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>Servers
      </a></li>
      <li><a href="/leaderboards">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>Leaderboards
      </a></li>
      <li id="nav-botpanel" style="display:none;"><a href="/bot-panel" class="btn-bot-panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Bot Panel
      </a></li>
    </ul>
    <div style="display:flex;align-items:center;gap:1rem;">
      <button class="mobile-toggle" onclick="toggleMobileNav()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="navbar-user" id="navbar-user">
        <div class="spinner" style="width:24px;height:24px;border-width:2px;"></div>
      </div>
    </div>
  </nav>

  <div class="mobile-nav" id="mobile-nav">
    <a href="/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
    <a href="/games"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4"/><path d="M8 10v4"/><circle cx="16" cy="13" r="1.5"/><circle cx="19" cy="11" r="1.5"/></svg>Games</a>
    <a href="/music"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>Music</a>
    <a href="/servers"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>Servers</a>
    <a href="/leaderboards"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>Leaderboards</a>
  </div>

  <div class="page">
    <div class="container section">
      <div class="dashboard-header" id="dashboard-header">
        <div class="spinner" style="width:40px;height:40px;"></div>
      </div>

      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Games Played</div></div>
        <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Music Hours</div></div>
        <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">XP Points</div></div>
        <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Servers Added</div></div>
      </div>

      <div class="xp-bar-container">
        <div class="xp-bar-header">
          <h3>Level Progress</h3>
          <span id="xp-text">0 / 100 XP</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="xp-fill" style="width:0%"></div>
        </div>
      </div>

      <div class="recent-activity">
        <h3>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;stroke:var(--primary-light);"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Recent Activity
        </h3>
        <div id="activity-list">
          <div class="activity-item">
            <div class="activity-dot"></div>
            <div class="activity-text">Welcome to GIANNI!</div>
            <div class="activity-time">Just now</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    function toggleMobileNav() {
      document.getElementById('mobile-nav').classList.toggle('show');
    }

    async function init() {
      const user = await initUser();
      if (!user) { window.location.href = '/login'; return; }

      // Header
      const header = document.getElementById('dashboard-header');
      const avatarHTML = user.avatar
        ? `<img src="${escapeHtml(user.avatar)}" class="dashboard-avatar" alt="${escapeHtml(user.username)}">`
        : `<div class="dashboard-avatar-placeholder">${escapeHtml(user.username.charAt(0).toUpperCase())}</div>`;

      header.innerHTML = `
        ${avatarHTML}
        <div class="dashboard-info">
          <h1>${escapeHtml(user.username)}</h1>
          <p>${escapeHtml(user.email || 'No email')}</p>
          <div class="level-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            Level ${user.stats.level}
          </div>
        </div>
      `;

      // Stats
      const stats = user.stats;
      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4"/><path d="M8 10v4"/><circle cx="16" cy="13" r="1.5"/><circle cx="19" cy="11" r="1.5"/></svg></div>
          <div class="stat-value">${stats.gamesPlayed}</div>
          <div class="stat-label">Games Played</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
          <div class="stat-value">${stats.musicHours}</div>
          <div class="stat-label">Music Hours</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
          <div class="stat-value">${formatNumber(stats.xpPoints)}</div>
          <div class="stat-label">XP Points</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg></div>
          <div class="stat-value">${stats.serversAdded}</div>
          <div class="stat-label">Servers Added</div>
        </div>
      `;

      // XP bar
      document.getElementById('xp-text').textContent = `${stats.xpProgress}% to Level ${stats.level + 1}`;
      document.getElementById('xp-fill').style.width = stats.xpProgress + '%';
    }
    init();
  </script>
</body>
</html>
