<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servers — GIANNI</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .page-header h2 {
      font-size: 1.8rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .page-header h2 svg {
      width: 28px;
      height: 28px;
      stroke: var(--primary-light);
    }
    .add-server-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.75rem 1.75rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 0 25px var(--primary-glow);
      transition: all 0.3s;
    }
    .add-server-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 40px var(--primary-glow);
    }
    .add-server-btn svg {
      width: 18px;
      height: 18px;
      stroke: white;
    }
    .servers-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 2rem;
    }
    .servers-sidebar {
      padding-top: 0.5rem;
    }
    .filter-group {
      margin-bottom: 2rem;
    }
    .filter-title {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .filter-title svg {
      width: 14px;
      height: 14px;
      stroke: var(--text-muted);
    }
    .filter-btn {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.6rem 0.875rem;
      background: none;
      border: none;
      color: var(--text-muted);
      text-align: left;
      cursor: pointer;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.25s;
      margin-bottom: 0.25rem;
      font-family: inherit;
    }
    .filter-btn svg {
      width: 16px;
      height: 16px;
      stroke: var(--text-muted);
      opacity: 0.7;
    }
    .filter-btn:hover {
      background: var(--bg-card2);
      color: var(--text);
    }
    .filter-btn:hover svg { opacity: 1; }
    .filter-btn.active {
      background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(91,33,182,0.08));
      color: var(--primary-light);
      font-weight: 600;
    }
    .filter-btn.active svg {
      stroke: var(--primary-light);
      opacity: 1;
    }
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .empty-state svg {
      width: 64px;
      height: 64px;
      stroke: var(--text-dim);
      margin-bottom: 1rem;
    }
    @media (max-width: 768px) {
      .servers-layout { grid-template-columns: 1fr; }
      .servers-sidebar { display: none; }
    }
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute;">
    <defs>
      <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#a855f7"/>
        <stop offset="100%" style="stop-color:#7c3aed"/>
      </linearGradient>
    </defs>
  </svg>

  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      GIANNI
    </a>
    <ul class="navbar-nav">
      <li><a href="/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a></li>
      <li><a href="/games">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4"/><path d="M8 10v4"/><circle cx="16" cy="13" r="1.5"/><circle cx="19" cy="11" r="1.5"/></svg>
        Games
      </a></li>
      <li><a href="/music">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Music
      </a></li>
      <li><a href="/servers" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
        Servers
      </a></li>
      <li><a href="/leaderboards">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        Leaderboards
      </a></li>
      <li id="nav-botpanel" style="display:none;"><a href="/bot-panel" class="btn-bot-panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Bot Panel
      </a></li>
    </ul>
    <div style="display:flex;align-items:center;gap:1rem;">
      <button class="mobile-toggle" onclick="toggleMobileNav()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="navbar-user" id="navbar-user">
        <div class="spinner" style="width:24px;height:24px;border-width:2px;"></div>
      </div>
    </div>
  </nav>

  <div class="mobile-nav" id="mobile-nav">
    <a href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="/games">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4"/><path d="M8 10v4"/><circle cx="16" cy="13" r="1.5"/><circle cx="19" cy="11" r="1.5"/></svg>
      Games
    </a>
    <a href="/music">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      Music
    </a>
    <a href="/servers" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
      Servers
    </a>
    <a href="/leaderboards">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
      Leaderboards
    </a>
  </div>

  <div class="page">
    <div class="container section">
      <div class="page-header">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
          Discover Servers
        </h2>
        <button class="add-server-btn" onclick="addServer()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Your Server
        </button>
      </div>

      <div class="servers-layout">
        <div class="servers-sidebar">
          <div class="filter-group">
            <div class="filter-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
              Categories
            </div>
            <button class="filter-btn active" onclick="setCategory('All', this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
              All
            </button>
            <button class="filter-btn" onclick="setCategory('Gaming', this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4"/><path d="M8 10v4"/><circle cx="16" cy="13" r="1.5"/><circle cx="19" cy="11" r="1.5"/></svg>
              Gaming
            </button>
            <button class="filter-btn" onclick="setCategory('Music', this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
              Music
            </button>
            <button class="filter-btn" onclick="setCategory('Community', this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              Community
            </button>
          </div>
          <div class="filter-group">
            <div class="filter-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
              Sort by
            </div>
            <button class="filter-btn active" onclick="setSort('Most Active', this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
              Most Active
            </button>
            <button class="filter-btn" onclick="setSort('Newest', this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              Newest
            </button>
            <button class="filter-btn" onclick="setSort('Top Rated', this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              Top Rated
            </button>
          </div>
        </div>

        <div>
          <div id="servers-loading" style="text-align:center;padding:4rem;">
            <div class="spinner" style="margin:0 auto;"></div>
            <p style="color:var(--text-muted);margin-top:1rem;font-size:0.875rem;">Loading servers...</p>
          </div>
          <div class="servers-grid" id="servers-grid" style="display:none;"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    let currentCategory = 'All';
    let currentSort = 'Most Active';

    function toggleMobileNav() {
      document.getElementById('mobile-nav').classList.toggle('show');
    }

    function setCategory(cat, el) {
      currentCategory = cat;
      document.querySelectorAll('.filter-group:first-child .filter-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      loadServers();
    }

    function setSort(sort, el) {
      currentSort = sort;
      document.querySelectorAll('.filter-group:last-child .filter-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      loadServers();
    }

    function addServer() {
      showToast('Server submission coming soon!', 'info');
    }

    function joinServer(id, name) {
      showToast('Redirecting to join "' + escapeHtml(name) + '"...', 'success');
      setTimeout(() => window.open('https://discord.gg/your-invite', '_blank'), 500);
    }

    function getCategoryBadge(cat) {
      const map = { Gaming: 'badge-gaming', Music: 'badge-music', Community: 'badge-community' };
      return map[cat] || 'badge-primary';
    }

    function getCategoryIcon(cat) {
      const icons = {
        Gaming: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4"/><path d="M8 10v4"/><circle cx="16" cy="13" r="1.5"/><circle cx="19" cy="11" r="1.5"/></svg>',
        Music: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>',
        Community: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>'
      };
      return icons[cat] || icons['Community'];
    }

    function renderStars(rating) {
      const full = Math.floor(rating);
      const half = rating % 1 >= 0.5;
      let html = '<span class="server-rating">';
      for (let i = 0; i < 5; i++) {
        if (i < full) {
          html += '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
        } else if (i === full && half) {
          html += '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><defs><linearGradient id="half"><stop offset="50%" stop-color="#fbbf24"/><stop offset="50%" stop-color="transparent"/></linearGradient></defs><polygon fill="url(#half)" points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/><polygon fill="none" stroke="#fbbf24" stroke-width="1.5" points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
        } else {
          html += '<svg viewBox="0 0 24 24" fill="none" stroke="#555570" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
        }
      }
      return html + '</span>';
    }

    async function loadServers() {
      document.getElementById('servers-grid').style.display = 'none';
      document.getElementById('servers-loading').style.display = 'block';

      try {
        const params = new URLSearchParams({ category: currentCategory, sort: currentSort });
        const res = await fetch('/api/servers?' + params);
        const servers = await res.json();

        document.getElementById('servers-loading').style.display = 'none';
        const grid = document.getElementById('servers-grid');
        grid.style.display = 'grid';
        grid.innerHTML = '';

        if (servers.length === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="15" x2="16" y2="15"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
              <div style="font-weight:600;margin-bottom:0.25rem;">No servers found</div>
              <div style="font-size:0.875rem;">Try a different category or check back later.</div>
            </div>
          `;
          return;
        }

        servers.forEach((s, idx) => {
          const card = document.createElement('div');
          card.className = 'server-card';
          card.style.animationDelay = (idx * 0.05) + 's';
          card.classList.add('animate-fade-in');
          card.onclick = () => joinServer(s.id, s.name);
          card.innerHTML = `
            <div class="server-card-header">
              <div class="server-icon">
                ${getCategoryIcon(s.category)}
              </div>
              <div class="server-info">
                <div class="server-name">${escapeHtml(s.name)}</div>
                <div class="server-members">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                  ${formatNumber(s.members)} members
                </div>
              </div>
              ${renderStars(s.rating)}
            </div>
            <div style="display:flex;gap:0.4rem;margin-bottom:0.75rem;">
              <span class="badge ${getCategoryBadge(s.category)}">${escapeHtml(s.category)}</span>
              ${s.active ? '<span class="badge badge-active">Active</span>' : ''}
            </div>
            <div class="server-desc">${escapeHtml(s.description)}</div>
            <div class="server-footer">
              <span style="font-size:0.85rem;color:var(--text-muted);display:flex;align-items:center;gap:0.3rem;">
                <svg viewBox="0 0 24 24" fill="currentColor" style="width:14px;height:14px;color:var(--warning);"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                ${s.rating.toFixed(1)}
              </span>
              <button class="btn btn-discord btn-sm" onclick="event.stopPropagation();joinServer('${s.id}','${escapeHtml(s.name)}')">
                <svg viewBox="0 0 24 24" fill="currentColor" style="width:14px;height:14px;"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057.1 18.081.114 18.104.133 18.12a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
                Join Server
              </button>
            </div>
          `;
          grid.appendChild(card);
        });
      } catch {
        document.getElementById('servers-loading').innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <div style="font-weight:600;margin-bottom:0.25rem;">Failed to load servers</div>
            <div style="font-size:0.875rem;">Please try again later.</div>
          </div>
        `;
      }
    }

    async function init() {
      const user = await initUser();
      if (!user) { window.location.href = '/login'; return; }
      loadServers();
    }
    init();
  </script>
</body>
